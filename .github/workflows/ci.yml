name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist
        run: |
          test -f dist/index.js || { echo "dist/index.js missing"; exit 1; }
          head -1 dist/index.js | grep -q '#!/usr/bin/env node' || { echo "shebang missing from dist/index.js"; exit 1; }
          echo "dist/index.js OK"

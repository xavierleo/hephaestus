name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package release tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="hephaestus-${VERSION}.tar.gz"
          tar -czf "$TARBALL" dist install.sh package.json package-lock.json
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Smoke test release tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir smoke
          tar -xzf "$TARBALL" -C smoke
          (cd smoke && npm ci --omit=dev --silent)
          node smoke/dist/index.js --version | grep -qx "$VERSION"
          node smoke/dist/index.js --list >/dev/null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
          generate_release_notes: true
